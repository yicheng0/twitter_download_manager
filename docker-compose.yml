services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      TW_WEB_PUBLIC: "1"
      TW_WEB_DATA_DIR: /data
      TZ: Asia/Shanghai
    volumes:
      - ./data:/data
    ports:
      - "${APP_BIND_HOST:-0.0.0.0}:${APP_HOST_PORT:-18081}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    profiles:
      - caddy
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
